version: "3.9"

# Para desarrollo local: levanta servidor + auth-service en la misma red Docker.
# Los servicios se resuelven por nombre (DNS interno de Docker),
# igual que lo harán en producción con Route 53.

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"   # Protocolo principal
      - "8081:8081"   # HTTP interface
    volumes:
      - ./server/logs:/app/logs
    depends_on:
      - auth-service
    networks:
      - iot-net

  auth-service:
    image: python:3.11-slim
    working_dir: /app
    command: python auth_server.py --port 9000
    volumes:
      - ./auth-service:/app
    ports:
      - "9000:9000"
    networks:
      - iot-net

networks:
  iot-net:
    driver: bridge
